<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Lite</title>

    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <div class="container">

        <h1>TaskFlow Lite</h1>

        <form id="task-form">

            <input
                type="text"
                id="task-input"
                placeholder="Enter a task..."
            >

            <button type="submit">
                Add Task
            </button>

        </form>

        <div class="stats">
            Total Tasks: <span id="task-count">0</span>
        </div>

        <ul id="task-list">

        </ul>

    </div>

    <script src="app.js"></script>

</body>
</html>
